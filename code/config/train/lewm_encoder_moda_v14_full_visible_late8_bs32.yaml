defaults:
  - lewm
  - _self_

output_model_name: lewm_encoder_moda_v14_full_visible_late8_bs32
subdir: pusht_encoder_moda_v14_full_visible_late8_bs32

wandb:
  enabled: false

trainer:
  accumulate_grad_batches: 4

loader:
  batch_size: 32

predictor:
  depth: 64
  dropout: 0.0
  emb_dropout: 0.0

encoder_moda:
  depth: 12
  heads: 16
  dim_head: 64
  mlp_dim: 2048
  hidden_ratio: 4
  dropout: 0.0
  emb_dropout: 0.0
  use_moda: true
  depth_start_layer: 8
  qk_norm: true
  rope_theta: 10000.0
  activation_checkpointing: true
  initializer_range: 0.02
  qkv_bias: false
  norm_eps: 1e-6
  chunk_visible: false
